name: CI Pipeline

on:
  push:
    branches:
      - tunk
  pull_request:
    branches:
      - tunk

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # 3. Build the project
      - name: Build with Gradle
        run: ./gradlew clean build

      # 4. Run tests
      - name: Run Unit Tests
        run: ./gradlew test

      # 5. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build and push Docker images for both services
      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/clientes-service:latest ./clientes
          docker push ${{ secrets.DOCKER_USERNAME }}/clientes-service:latest
          docker build -t ${{ secrets.DOCKER_USERNAME }}/transacciones-service:latest ./transacciones
          docker push ${{ secrets.DOCKER_USERNAME }}/transacciones-service:latest
